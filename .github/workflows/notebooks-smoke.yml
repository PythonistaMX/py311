name: Notebooks Smoke Test

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  smoke-notebooks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install nbformat nbclient

      - name: Execute notebook smoke cells
        run: |
          python - <<'PY'
          import copy
          import nbformat
          from nbclient import NotebookClient

          NOTEBOOKS = [
              "02_conceptos_basicos_de_numpy.ipynb",
              "09_introduccion_a_pandas.ipynb",
              "34_introduccion_a_polars.ipynb",
              "37_introduccion_a_dask.ipynb",
          ]

          MAX_CODE_CELLS = 8

          for path in NOTEBOOKS:
              print(f"\\n[SMOKE] Ejecutando: {path}")
              nb = nbformat.read(path, as_version=4)

              code_seen = 0
              filtered_cells = []
              for cell in nb.cells:
                  if cell.get("cell_type") != "code":
                      filtered_cells.append(cell)
                      continue

                  if code_seen < MAX_CODE_CELLS:
                      filtered_cells.append(cell)
                      code_seen += 1

              smoke_nb = copy.deepcopy(nb)
              smoke_nb.cells = filtered_cells

              client = NotebookClient(
                  smoke_nb,
                  timeout=180,
                  kernel_name="python3",
                  allow_errors=False,
              )
              client.execute()

              print(f"[OK] {path} (code cells ejecutadas: {code_seen})")
          PY
